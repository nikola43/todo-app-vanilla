<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📋 To Do List</h1>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Agregar nueva tarea..." autofocus>
            <button id="addBtn">+</button>
        </div>
        <ul id="taskList"></ul>
        <div class="footer">
            <span id="taskCount">0 tareas</span>
            <button id="clearBtn" class="clear-btn">Limpiar completadas</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
